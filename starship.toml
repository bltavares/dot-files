# Generate from preset with `starship preset jetpack -o ~/.config/starship.toml`
# and a few modifications
format = """
$cmd_duration\
$hostname\
$shlvl\
$shell\
$username\
$sudo\
$env_var\
$mise\
$directory \
$character\
"""

right_format = """
$singularity\
$kubernetes\
$vcsh\
$fossil_branch\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$custom\
$jobs\
$status\
$os\
$container\
$battery\
"""

add_newline = true

[character]
format = "$symbol\u00A0"
success_symbol = "[‚óâ](bold italic bright-yellow)"
error_symbol = "[‚äò](italic purple)"

[env_var.VIMSHELL] # vim subshell
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "italic bright-purple"
symbol = "‚óá‚îà"
disabled = false

[username]
style_user = "yellow bold"
style_root = "purple bold italic"
format = "[$user]($style) ‚ñª "
disabled = false
show_always = true

[directory]
home_symbol = "‚åÇ"
truncation_length = 2
truncation_symbol = "‚ñ¶ "
read_only = " ‚ñÝ"
style = "italic blue"
format = ' [$path]($style)[$read_only]($read_only_style)'

[cmd_duration]
min_time = 500
format = "[$duration ](italic bright-yellow)"

[jobs]
format = "[ $symbol$number]($style)"
style = "white"
symbol = "[‚ñ∂ ](blue italic)"

[localip]
ssh_only = true
format = "‚óØ[$localipv4](bold magenta)@"
disabled = true

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "dimmed white"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "[‚ñà](italic green)"
charging_symbol = "[‚Üë](italic green)"
discharging_symbol = "[‚Üì](italic)"
unknown_symbol = "[‚ñë](italic)"
empty_symbol = "[‚ñÉ](italic red)"

[[battery.display]]
threshold = 40
style = "dimmed yellow"

[[battery.display]]
threshold = 70
style = "dimmed white"

[git_branch]
format = "[ $symbol $branch(:$remote_branch)]($style)"
symbol = "[‚ó¨](bold bright-blue)"
style = "bold italic bright-blue"

[git_status]
style = "italic bright-blue"
format = """([‚é™$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed‚é•]($style))"""
conflicted = "[‚ó™‚ó¶](italic bright-magenta)"
ahead = "[‚ñ≤‚îÇ[${count}](bold white)‚îÇ](italic green)"
behind = "[‚ñΩ‚îÇ[${count}](bold white)‚îÇ](italic red)"
diverged = "[‚óá ‚ñ≤‚î§[${ahead_count}](regular white)‚îÇ‚ñΩ‚î§[${behind_count}](regular white)‚îÇ](italic bright-magenta)"
untracked = "[‚óå‚ó¶](italic bright-yellow)"
stashed = "[‚ó¶‚ó´‚ó¶](italic white)"
modified = "[‚óè‚ó¶](italic yellow)"
staged = "[‚ñÝ‚î§[$count](bold white)‚îÇ](italic bright-cyan)"
renamed = "[‚óé‚ó¶](italic bright-blue)"
deleted = "[‚úï](italic red)"

[deno]
format = " deno [‚à´ $version](blue italic)"
version_format = "${major}.${minor}"

[lua]
format = " lua [${symbol}${version}]($style)"
symbol = "‚®Ä "
style = "italic bright-yellow"

[nodejs]
format = " node [‚ó´ ($version)](italic bright-green)"
detect_files = ["package-lock.json", "yarn.lock"]
version_format = "${major}.${minor}"

[python]
format = " py [${symbol}${version}]($style)"
symbol = "[‚åâ](italic bright-blue)‚åä "
version_format = "${major}.${minor}"
style = "italic bright-yellow"

[ruby]
format = " rb [${symbol}${version}]($style)"
symbol = "‚óÜ "
version_format = "${major}.${minor}"
style = "italic red"

[rust]
format = " rs [$symbol$version]($style)"
symbol = "‚äÉ "
version_format = "${major}.${minor}"
style = "italic red"

[package]
format = " pkg [$symbol$version]($style)"
version_format = "${major}.${minor}"
symbol = "‚ó´ "
style = "bright-yellow italic"

[swift]
format = " sw [${symbol}${version}]($style)"
symbol = "‚óÅ "
style = "italic bright-red"
version_format = "${major}.${minor}"

[aws]
format = " aws [$symbol $profile $region]($style)"
style = "italic blue"
symbol = "‚ñ≤ "
disabled = true

[buf]
symbol = "‚ñÝ "
format = " buf [$symbol $version $buf_version]($style)"

[c]
symbol = "‚àÅ "
format = " c [$symbol($version(-$name))]($style)"

[conda]
symbol = "‚óØ "
format = " conda [$symbol$environment]($style)"

[dart]
symbol = "‚óÅ‚óÖ "
format = " dart [$symbol($version )]($style)"

[docker_context]
symbol = "‚óß "
format = " docker [$symbol$context]($style)"

[elixir]
symbol = "‚ñ≥ "
format = " exs [$symbol $version OTP $otp_version ]($style)"

[elm]
symbol = "‚ó© "
format = " elm [$symbol($version )]($style)"

[golang]
symbol = "‚à© "
format = " go [$symbol($version )]($style)"

[haskell]
symbol = "‚ùØŒª "
format = " hs [$symbol($version )]($style)"

[java]
symbol = "‚à™ "
format = " java [${symbol}(${version} )]($style)"

[julia]
symbol = "‚óé "
format = " jl [$symbol($version )]($style)"

[memory_usage]
symbol = "‚ñ™‚ñ´‚ñ™ "
format = " mem [${ram}( ${swap})]($style)"

[nim]
symbol = "‚ñ¥‚ñ≤‚ñ¥ "
format = " nim [$symbol($version )]($style)"

[nix_shell]
symbol = "‚äõ "
format = " nix [$symbol$state $name]($style)"

[spack]
symbol = "‚óá "
format = " spack [$symbol$environment]($style)"

[kubernetes]
disabled = false
format= 'k8s [$symbol$context( \($namespace\))]($style) '
detect_extensions = ['yaml']
detect_files = ['project.clj']
# Not setting it would enable it always in v1.19.0: https://github.com/starship/starship/issues/5978
detect_env_vars = ['INVALID']

[env_var.MISE_ENV]
format = ' \([env:$env_value](italic fg:purple)\)'

[mise]
disabled = false
format = ' \([mise]($style)\)'

[container]
disabled = true

[hostname]
# TODO per-host style when supported https://github.com/starship/starship/pull/3014
format = '[$ssh_symbol$hostname]($style)@'
ssh_only = false
