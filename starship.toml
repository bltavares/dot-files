# Generate from preset with `starship preset jetpack -o ~/.config/starship.toml`
# and a few modifications
format = """
$cmd_duration\
$hostname\
$localip\
$shlvl\
$shell\
$env_var\
$username\
$sudo\
$directory \
$character\
"""

right_format = """
$singularity\
$kubernetes\
$vcsh\
$fossil_branch\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$custom\
$jobs\
$status\
$os\
$container\
$battery\
"""

add_newline = true

[character]
format = "$symbol "
success_symbol = "[в—ү](bold italic bright-yellow)"
error_symbol = "[вҠҳ](italic purple)"

[env_var.VIMSHELL] # vim subshell
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "italic bright-purple"
symbol = "в—Үв”Ҳ"
disabled = false

[username]
style_user = "yellow bold"
style_root = "purple bold italic"
format = "[$user]($style) в–» "
disabled = false

[directory]
home_symbol = "вҢӮ"
truncation_length = 2
truncation_symbol = "в–Ұ "
read_only = " в– "
style = "italic blue"
format = ' [$path]($style)[$read_only]($read_only_style)'

[cmd_duration]
min_time = 500
format = "[$duration ](italic bright-yellow)"

[jobs]
format = "[ $symbol$number]($style)"
style = "white"
symbol = "[в–¶ ](blue italic)"

[localip]
ssh_only = true
format = "в—Ҝ[$localipv4](bold magenta)@"
disabled = false

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "dimmed white"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "[в–Ҳ](italic green)"
charging_symbol = "[вҶ‘](italic green)"
discharging_symbol = "[вҶ“](italic)"
unknown_symbol = "[в–‘](italic)"
empty_symbol = "[в–ғ](italic red)"

[[battery.display]]
threshold = 40
style = "dimmed yellow"

[[battery.display]]
threshold = 70
style = "dimmed white"

[git_branch]
format = "[ $symbol $branch(:$remote_branch)]($style)"
symbol = "[в—¬](bold bright-blue)"
style = "bold italic bright-blue"

[git_status]
style = "italic bright-blue"
format = """([вҺӘ$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashedвҺҘ]($style))"""
conflicted = "[в—Әв—Ұ](italic bright-magenta)"
ahead = "[в–Ів”Ӯ[${count}](bold white)в”Ӯ](italic green)"
behind = "[в–Ҫв”Ӯ[${count}](bold white)в”Ӯ](italic red)"
diverged = "[в—Ү в–Ів”Ө[${ahead_count}](regular white)в”Ӯв–Ҫв”Ө[${behind_count}](regular white)в”Ӯ](italic bright-magenta)"
untracked = "[в—Ңв—Ұ](italic bright-yellow)"
stashed = "[в—Ұв—«в—Ұ](italic white)"
modified = "[в—Ҹв—Ұ](italic yellow)"
staged = "[в– в”Ө[$count](bold white)в”Ӯ](italic bright-cyan)"
renamed = "[в—Һв—Ұ](italic bright-blue)"
deleted = "[вң•](italic red)"

[deno]
format = " deno [вҲ« $version](blue italic)"
version_format = "${major}.${minor}"

[lua]
format = " lua [${symbol}${version}]($style)"
symbol = "вЁҖ "
style = "italic bright-yellow"

[nodejs]
format = " node [в—« ($version)](italic bright-green)"
detect_files = ["package-lock.json", "yarn.lock"]
version_format = "${major}.${minor}"

[python]
format = " py [${symbol}${version}]($style)"
symbol = "[вҢү](italic bright-blue)вҢҠ "
version_format = "${major}.${minor}"
style = "italic bright-yellow"

[ruby]
format = " rb [${symbol}${version}]($style)"
symbol = "в—Ҷ "
version_format = "${major}.${minor}"
style = "italic red"

[rust]
format = " rs [$symbol$version]($style)"
symbol = "вҠғ "
version_format = "${major}.${minor}"
style = "italic red"

[package]
format = " pkg [$symbol$version]($style)"
version_format = "${major}.${minor}"
symbol = "в—« "
style = "bright-yellow italic"

[swift]
format = " sw [${symbol}${version}]($style)"
symbol = "в—Ғ "
style = "italic bright-red"
version_format = "${major}.${minor}"

[aws]
format = " aws [$symbol $profile $region]($style)"
style = "italic blue"
symbol = "в–І "
disabled = true

[buf]
symbol = "в–  "
format = " buf [$symbol $version $buf_version]($style)"

[c]
symbol = "вҲҒ "
format = " c [$symbol($version(-$name))]($style)"

[conda]
symbol = "в—Ҝ "
format = " conda [$symbol$environment]($style)"

[dart]
symbol = "в—Ғв—… "
format = " dart [$symbol($version )]($style)"

[docker_context]
symbol = "в—§ "
format = " docker [$symbol$context]($style)"

[elixir]
symbol = "в–і "
format = " exs [$symbol $version OTP $otp_version ]($style)"

[elm]
symbol = "в—© "
format = " elm [$symbol($version )]($style)"

[golang]
symbol = "вҲ© "
format = " go [$symbol($version )]($style)"

[haskell]
symbol = "вқҜО» "
format = " hs [$symbol($version )]($style)"

[java]
symbol = "вҲӘ "
format = " java [${symbol}(${version} )]($style)"

[julia]
symbol = "в—Һ "
format = " jl [$symbol($version )]($style)"

[memory_usage]
symbol = "в–Әв–«в–Ә "
format = " mem [${ram}( ${swap})]($style)"

[nim]
symbol = "в–ҙв–Ів–ҙ "
format = " nim [$symbol($version )]($style)"

[nix_shell]
symbol = "вҠӣ "
format = " nix [$symbol$state $name]($style)"

[spack]
symbol = "в—Ү "
format = " spack [$symbol$environment]($style)"

[kubernetes]
disabled = false
format= 'k8s [$symbol$context( \($namespace\))]($style) '
detect_extensions = ['yaml']
detect_files = ['project.clj']
# Not setting it would enable it always in v1.19.0: https://github.com/starship/starship/issues/5978
detect_env_vars = ['INVALID']

[container]
disabled = true
