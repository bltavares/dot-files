# Generate from falsepreset with `starship preset jetpack -o ~/.config/starship.toml`
# and a few modifications
format = """
($mise${env_var.MISE_ENV}${env_var.VIMSHELL}$fill$git_metrics\n)$cmd_duration\
${env_var.X_COLOR_PS1}\
$shlvl\
$shell\
$sudo\
$directory \
$character\
"""

right_format = """
$git_branch\
$git_commit\
$git_state\
$git_status\
$package\
$dart\
$golang\
$nodejs\
$rust\
$terraform\
$custom\
$jobs\
$status\
$os\
$battery\
"""

add_newline = true

[shell]
disabled = false
powershell_indicator = '№Ља_'
zsh_indicator = '%_'
format = '[$indicator]($style)'

[shlvl]
disabled = false
format = '[$symbol]($style)'
repeat = true
symbol = 'РЮ»'
repeat_offset = 1

[fill]
symbol = ' '

[character]
format = "$symbol\u00A0"
success_symbol = "[РЌј](bold italic bright-yellow)"
error_symbol = "[РЌІ](italic purple)"
vimcmd_symbol = "[Рќа](italic dimmed green)"
# not supported in zsh
vimcmd_replace_one_symbol = "РЌї"
vimcmd_replace_symbol = "РќА"
vimcmd_visual_symbol = "Рќ╝"

[env_var.VIMSHELL] # vim subshell
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "bold bright-purple"
symbol = "РЌЄРћѕ"
disabled = false

[directory]
home_symbol = "Рїѓ"
truncation_length = 2
truncation_symbol = "Рќд "
read_only = " Рќа"
use_os_path_sep = true
style = "blue"
format = ' [$path]($style)[$read_only]($read_only_style)'
repo_root_style = 'bold blue'
repo_root_format = ' [$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [Рќ│](bold bright-blue)'

[cmd_duration]
min_time = 500
format = "[$duration ](italic bright-yellow)"

[jobs]
format = "[ $symbol$number]($style)"
style = "white"
symbol = "[РќХ](blue)"

[localip]
ssh_only = true
format = "РЌ»[$localipv4](bold magenta)@"
disabled = true

[time]
disabled = true
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "dimmed white"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "[Рќѕ]"
charging_symbol = "[РєЉ](italic bold green)"
discharging_symbol = "[РєЊ]"
unknown_symbol = "[РќЉ]"
empty_symbol = "[РќЃ]"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "italic dimmed yellow"

[git_branch]
format = " [$symbol $branch(:$remote_branch)]($style)"
symbol = "[Рќ│](bold bright-blue)"
style = "bright-blue"
truncation_symbol = "РІ»"
truncation_length = 11
#ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = '([Рќ┤$added]($added_style))([Рќ┐$deleted]($deleted_style))'
added_style = 'dimmed green'
deleted_style = 'dimmed red'
ignore_submodules = true
disabled = false

[git_status]
style = "bold bright-blue"
format = "([Рјф$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashedРјЦ]($style))"
conflicted = "[РЌфРЌд](bright-magenta)"
ahead = "[Рќ┤Рћѓ[${count}](bold white)Рћѓ](green)"
behind = "[Рќ┐Рћѓ[${count}](bold white)Рћѓ](red)"
diverged = "[РЌЄ Рќ┤Рћц[${ahead_count}](regular white)РћѓРќ┐Рћц[${behind_count}](regular white)Рћѓ](bright-magenta)"
untracked = "[РЌїРЌд](bright-yellow)"
stashed = "[РЌЃРЌѕ](white)"
modified = "[РЌЈРЌд](yellow)"
staged = "[РќфРћц[$count](bold white)Рћѓ](bright-cyan)"
renamed = "[РЌјРЌд](bright-blue)"
deleted = "[РюЋ](red)"

[package]
format = " [pkg](italic dimmed) [$symbol$version]($style)"
version_format = "${raw}"
symbol = "РЌе "
style = "dimmed yellow italic bold"

[dart]
symbol = "РЌЂРЌЁ "
format = " dart [$symbol($version )]($style)"

[golang]
symbol = "РѕЕ "
format = " go [$symbol($version )]($style)"

[nodejs]
format = " [node](italic) [РЌФ ($version)](bold bright-green)"
version_format = "${raw}"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[rust]
format = " [rs](italic) [$symbol$version]($style)"
symbol = "РіЃ "
version_format = "${raw}"
style = "bold red"

# Mine
[mise]
disabled = false
format = '[\([mise]($style dimmed)\)](grey)'

[env_var.X_COLOR_PS1]
format = '$env_value '

[env_var.MISE_ENV]
format = ' \([env: $env_value](fg:blue dimmed)\)'
